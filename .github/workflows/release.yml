name: Release

on:
  release:
    types: [published]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create zip
        run: zip -r "CRMod-${{ github.event.release.tag_name }}.zip" . -x "*.git*"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: "CRMod-${{ github.event.release.tag_name }}.zip"